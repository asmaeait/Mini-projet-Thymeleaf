<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservations - Hotel Royal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: #f0f4f8; }
        nav { background: #1a5276; padding: 14px 24px; display: flex; gap: 20px; align-items: center; }
        nav a { color: white; text-decoration: none; font-size: 15px; padding: 6px 12px; border-radius: 4px; }
        nav a:hover { background: #21618c; }
        nav .brand { font-size: 18px; font-weight: bold; color: #d6eaf8; margin-right: 20px; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #1a5276; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th { background: #1a5276; color: white; padding: 12px; text-align: left; }
        td { padding: 11px 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f0f4f8; }
        .btn { display: inline-block; padding: 7px 14px; border-radius: 4px; text-decoration: none; font-size: 13px; cursor: pointer; border: none; }
        .btn-primary { background: #1a5276; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-danger  { background: #e74c3c; color: white; }
        .btn:hover { opacity: 0.85; }
        .filtre { background: white; padding: 16px 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
        .filtre label { display: block; margin-bottom: 4px; font-size: 13px; color: #555; }
        .filtre select, .filtre input[type=date] { padding: 7px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-CONFIRMEE  { background: #d5f5e3; color: #196f3d; }
        .badge-EN_ATTENTE { background: #fdebd0; color: #935116; }
        .badge-ANNULEE    { background: #fadbd8; color: #922b21; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🏨 Hotel Royal</span>
    <a th:href="@{/chambres}">Chambres</a>
    <a th:href="@{/clients}">Clients</a>
    <a th:href="@{/reservations}">Reservations</a>
    <a th:href="@{/stats}">Statistiques</a>
</nav>
<div class="container">
    <div class="top-bar">
        <h1>Reservations</h1>
        <a th:href="@{/reservations/nouveau}" class="btn btn-primary">+ Nouvelle reservation</a>
    </div>

    <form class="filtre" method="get" th:action="@{/reservations}">
        <div>
            <label>Statut</label>
            <select name="statut">
                <option value="">Tous les statuts</option>
                <option value="CONFIRMEE"  th:selected="${statutFiltre == 'CONFIRMEE'}">Confirmee</option>
                <option value="EN_ATTENTE" th:selected="${statutFiltre == 'EN_ATTENTE'}">En attente</option>
                <option value="ANNULEE"    th:selected="${statutFiltre == 'ANNULEE'}">Annulee</option>
            </select>
        </div>
        <div>
            <label>Du</label>
            <input type="date" name="debut" th:value="${debut}">
        </div>
        <div>
            <label>Au</label>
            <input type="date" name="fin" th:value="${fin}">
        </div>
        <button type="submit" class="btn btn-primary">Filtrer</button>
        <a th:href="@{/reservations}" class="btn" style="background:#95a5a6;color:white;">Reinitialiser</a>
    </form>

    <table>
        <thead>
        <tr>
            <th>Client</th>
            <th>Chambre</th>
            <th>Etage</th>
            <th>Check-in</th>
            <th>Check-out</th>
            <th>Statut</th>
            <th>Total</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${reservations}">
            <td th:text="${r.client.nom}"></td>
            <td th:text="${r.chambre.numero + ' (' + r.chambre.type + ')'}"></td>
            <td th:text="${r.chambre.etage}"></td>
            <td th:text="${r.checkIn}"></td>
            <td th:text="${r.checkOut}"></td>
            <td>
                <span th:class="'badge badge-' + ${r.statut}" th:text="${r.statut}"></span>
            </td>
            <td th:text="${r.total + ' euros'}"></td>
            <td>
                <a th:href="@{/reservations/modifier/{id}(id=${r.id})}"  class="btn btn-warning">Modifier</a>
                <a th:href="@{/reservations/supprimer/{id}(id=${r.id})}" class="btn btn-danger"
                   onclick="return confirm('Supprimer cette reservation ?')">Supprimer</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(reservations)}">
            <td colspan="8" style="text-align:center;color:#888;padding:20px;">Aucune reservation trouvee.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
