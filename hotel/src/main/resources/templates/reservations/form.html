<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservation - Hotel Royal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: #f0f4f8; }
        nav { background: #1a5276; padding: 14px 24px; display: flex; gap: 20px; align-items: center; }
        nav a { color: white; text-decoration: none; font-size: 15px; padding: 6px 12px; border-radius: 4px; }
        nav a:hover { background: #21618c; }
        nav .brand { font-size: 18px; font-weight: bold; color: #d6eaf8; margin-right: 20px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #1a5276; }
        .card { background: white; padding: 30px; border-radius: 8px; max-width: 520px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 9px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 18px; font-size: 14px; }
        .btn { display: inline-block; padding: 9px 18px; border-radius: 4px; text-decoration: none; font-size: 14px; cursor: pointer; border: none; }
        .btn-success   { background: #1a5276; color: white; }
        .btn-secondary { background: #95a5a6; color: white; margin-left: 10px; }
        .btn:hover { opacity: 0.85; }
        .info { background: #d6eaf8; border-left: 4px solid #1a5276; padding: 10px 14px; border-radius: 4px; margin-bottom: 18px; font-size: 13px; color: #1a5276; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🏨 Hotel Royal</span>
    <a th:href="@{/chambres}">Chambres</a>
    <a th:href="@{/clients}">Clients</a>
    <a th:href="@{/reservations}">Reservations</a>
    <a th:href="@{/stats}">Statistiques</a>
</nav>
<div class="container">
    <h1 th:text="${reservation.id == null ? 'Nouvelle reservation' : 'Modifier la reservation'}"></h1>
    <div class="card">
        <div class="info">Le cout total est calcule automatiquement selon les dates et le prix de la chambre.</div>
        <form th:action="@{/reservations/sauvegarder}" th:object="${reservation}" method="post">
            <input type="hidden" th:field="*{id}">

            <label>Client</label>
            <select name="clientId" required>
                <option value="">-- Choisir un client --</option>
                <option th:each="c : ${clients}"
                        th:value="${c.id}"
                        th:text="${c.nom + ' (' + c.passeport + ')'}"
                        th:selected="${reservation.client != null && reservation.client.id == c.id}">
                </option>
            </select>

            <label>Chambre</label>
            <select name="chambreId" required>
                <option value="">-- Choisir une chambre --</option>
                <option th:each="ch : ${chambres}"
                        th:value="${ch.id}"
                        th:text="${'Etage ' + ch.etage + ' - ' + ch.numero + ' ' + ch.type + ' (' + ch.prixNuit + ' euros/nuit)'}"
                        th:selected="${reservation.chambre != null && reservation.chambre.id == ch.id}">
                </option>
            </select>

            <label>Date d'arrivee (check-in)</label>
            <input type="date" th:field="*{checkIn}" required>

            <label>Date de depart (check-out)</label>
            <input type="date" th:field="*{checkOut}" required>

            <label>Statut</label>
            <select th:field="*{statut}" required>
                <option value="">-- Choisir un statut --</option>
                <option value="EN_ATTENTE" th:selected="${reservation.statut == 'EN_ATTENTE'}">En attente</option>
                <option value="CONFIRMEE"  th:selected="${reservation.statut == 'CONFIRMEE'}">Confirmee</option>
                <option value="ANNULEE"    th:selected="${reservation.statut == 'ANNULEE'}">Annulee</option>
            </select>

            <button type="submit" class="btn btn-success">Enregistrer</button>
            <a th:href="@{/reservations}" class="btn btn-secondary">Annuler</a>
        </form>
    </div>
</div>
</body>
</html>
