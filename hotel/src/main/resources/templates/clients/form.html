<!DOCTYPE html>
<!-- Structure standard HTML5, intégration du moteur de template Thymeleaf pour le rendu dynamique côté serveur -->
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Client - Hotel Royal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: #f0f4f8; }
        nav { background: #1a5276; padding: 14px 24px; display: flex; gap: 20px; align-items: center; }
        nav a { color: white; text-decoration: none; font-size: 15px; padding: 6px 12px; border-radius: 4px; }
        nav a:hover { background: #21618c; }
        nav .brand { font-size: 18px; font-weight: bold; color: #d6eaf8; margin-right: 20px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #1a5276; }
        .card { background: white; padding: 30px; border-radius: 8px; max-width: 500px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 14px; }
        input { width: 100%; padding: 9px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 18px; font-size: 14px; }
        .btn { display: inline-block; padding: 9px 18px; border-radius: 4px; text-decoration: none; font-size: 14px; cursor: pointer; border: none; }
        .btn-success   { background: #1a5276; color: white; }
        .btn-secondary { background: #95a5a6; color: white; margin-left: 10px; }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
<!-- Barre de navigation transverse de l'application Hotel Royal -->
<nav>
    <span class="brand">🏨 Hotel Royal</span>
    <a th:href="@{/chambres}">Chambres</a>
    <a th:href="@{/clients}">Clients</a>
    <a th:href="@{/reservations}">Reservations</a>
    <a th:href="@{/stats}">Statistiques</a>
</nav>
<div class="container">
    <!-- Le titre bascule dynamiquement : si l'ID est nul, c'est une création, sinon c'est une mise à jour d'un client existant -->
    <h1 th:text="${client.id == null ? 'Nouveau client' : 'Modifier le client'}"></h1>
    <div class="card">
        <!-- Formulaire sécurisé liant l'objet 'client' venant du contrôleur à l'action /clients/sauvegarder -->
        <form th:action="@{/clients/sauvegarder}" th:object="${client}" method="post">
            <!-- Champ caché (non visible par l'utilisateur) crucial pour conserver la référence lors d'une édition -->
            <input type="hidden" th:field="*{id}">

            <label>Nom complet</label>
            <!-- Liaison bidirectionnelle avec la propriété 'nom' du modèle -->
            <input type="text" th:field="*{nom}" placeholder="Ex: Jean Dupont" required>

            <label>Passeport / CNI</label>
            <!-- Liaison bidirectionnelle avec la propriété 'passeport', utilisé légalement -->
            <input type="text" th:field="*{passeport}" placeholder="Ex: FR1234567" required>

            <!-- Boutons de validation ou d'annulation redirigeant vers la liste -->
            <button type="submit" class="btn btn-success">Enregistrer</button>
            <a th:href="@{/clients}" class="btn btn-secondary">Annuler</a>
        </form>
    </div>
</div>
</body>
</html>
