<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chambres - Hotel Royal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: #f0f4f8; }
        nav { background: #1a5276; padding: 14px 24px; display: flex; gap: 20px; align-items: center; }
        nav a { color: white; text-decoration: none; font-size: 15px; padding: 6px 12px; border-radius: 4px; }
        nav a:hover { background: #21618c; }
        nav .brand { font-size: 18px; font-weight: bold; color: #d6eaf8; margin-right: 20px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #1a5276; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th { background: #1a5276; color: white; padding: 12px; text-align: left; }
        td { padding: 11px 12px; border-bottom: 1px solid #eee; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f0f4f8; }
        .btn { display: inline-block; padding: 7px 14px; border-radius: 4px; text-decoration: none; font-size: 13px; cursor: pointer; border: none; }
        .btn-primary { background: #1a5276; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-danger  { background: #e74c3c; color: white; }
        .btn:hover { opacity: 0.85; }
        .filtre { background: white; padding: 16px 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .filtre label { display: block; margin-bottom: 4px; font-size: 13px; color: #555; }
        .filtre select { padding: 7px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-green { background: #d5f5e3; color: #196f3d; }
        .badge-red   { background: #fadbd8; color: #922b21; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🏨 Hotel Royal</span>
    <a th:href="@{/chambres}">Chambres</a>
    <a th:href="@{/clients}">Clients</a>
    <a th:href="@{/reservations}">Reservations</a>
    <a th:href="@{/stats}">Statistiques</a>
</nav>
<div class="container">
    <div class="top-bar">
        <h1>Chambres</h1>
        <a th:href="@{/chambres/nouveau}" class="btn btn-primary">+ Nouvelle chambre</a>
    </div>

    <form class="filtre" method="get" th:action="@{/chambres}">
        <div>
            <label>Type</label>
            <select name="type">
                <option value="">Tous les types</option>
                <option value="SINGLE" th:selected="${typeFiltre == 'SINGLE'}">Single</option>
                <option value="DOUBLE" th:selected="${typeFiltre == 'DOUBLE'}">Double</option>
                <option value="SUITE"  th:selected="${typeFiltre == 'SUITE'}">Suite</option>
            </select>
        </div>
        <div>
            <label>Disponibilite</label>
            <select name="disponible">
                <option value="">Toutes</option>
                <option value="true"  th:selected="${disponibleFiltre == 'true'}">Disponible</option>
                <option value="false" th:selected="${disponibleFiltre == 'false'}">Occupee</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Filtrer</button>
        <a th:href="@{/chambres}" class="btn" style="background:#95a5a6;color:white;">Reinitialiser</a>
    </form>

    <table>
        <thead>
        <tr>
            <th>Numero</th>
            <th>Etage</th>
            <th>Type</th>
            <th>Prix / nuit</th>
            <th>Disponibilite</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="chambre : ${chambres}">
            <td th:text="${chambre.numero}"></td>
            <td th:text="${chambre.etage}"></td>
            <td th:text="${chambre.type}"></td>
            <td th:text="${chambre.prixNuit} + ' euros'"></td>
            <td>
                <span th:if="${chambre.disponible}"     class="badge badge-green">Disponible</span>
                <span th:unless="${chambre.disponible}" class="badge badge-red">Occupee</span>
            </td>
            <td>
                <a th:href="@{/chambres/modifier/{id}(id=${chambre.id})}"  class="btn btn-warning">Modifier</a>
                <a th:href="@{/chambres/supprimer/{id}(id=${chambre.id})}" class="btn btn-danger"
                   onclick="return confirm('Supprimer cette chambre ?')">Supprimer</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(chambres)}">
            <td colspan="6" style="text-align:center;color:#888;padding:20px;">Aucune chambre trouvee.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
