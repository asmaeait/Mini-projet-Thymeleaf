<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hôtel Manager</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: #f5f5f5; }
        nav { background: #2c3e50; padding: 14px 24px; display: flex; gap: 20px; align-items: center; }
        nav a { color: white; text-decoration: none; font-size: 15px; padding: 6px 12px; border-radius: 4px; }
        nav a:hover { background: #34495e; }
        nav .brand { font-size: 18px; font-weight: bold; color: #ecf0f1; margin-right: 20px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
        td { padding: 11px 12px; border-bottom: 1px solid #eee; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9f9f9; }
        .btn { display: inline-block; padding: 7px 14px; border-radius: 4px; text-decoration: none; font-size: 13px; cursor: pointer; border: none; }
        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn:hover { opacity: 0.85; }
        form label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        form input, form select { width: 100%; padding: 9px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 15px; font-size: 14px; }
        form .card { background: white; padding: 30px; border-radius: 8px; max-width: 500px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .filtre { background: white; padding: 16px 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .filtre label { margin-bottom: 4px; font-size: 13px; color: #555; }
        .filtre input, .filtre select { padding: 7px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; margin-bottom: 0; width: auto; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-green { background: #d5f5e3; color: #196f3d; }
        .badge-red { background: #fadbd8; color: #922b21; }
        .badge-orange { background: #fdebd0; color: #935116; }
        .badge-blue { background: #d6eaf8; color: #1a5276; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); text-align: center; }
        .stat-card .number { font-size: 36px; font-weight: bold; color: #2c3e50; }
        .stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🏨 Hôtel Manager</span>
    <a th:href="@{/chambres}">Chambres</a>
    <a th:href="@{/clients}">Clients</a>
    <a th:href="@{/reservations}">Réservations</a>
    <a th:href="@{/stats}">Statistiques</a>
</nav>
<div class="container">
    <!-- contenu inséré ici -->
</div>
</body>
</html>
